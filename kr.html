<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇰🇷 韓語 5000單字</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="韓語單字">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#003478">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;
    --accent:#4a90d9;--accent2:#c0392b;--text:#f0ede8;--muted:#8a8799;
    --green:#27ae60;--blue:#2980b9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:linear-gradient(135deg,#001a40 0%,#0d0d0f 60%);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Playfair Display',serif;font-size:1.5rem;color:#4a90d9;letter-spacing:-0.5px;}
  .logo span{color:var(--text);font-weight:400;font-size:0.9rem;display:block;}
  .stats-bar{display:flex;gap:20px;align-items:center;}
  .stat{text-align:center;}
  .stat-n{font-size:1.2rem;font-weight:600;color:#4a90d9;}
  .stat-l{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .controls{padding:16px 28px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);}
  .search-wrap{flex:1;min-width:200px;position:relative;}
  .search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px 10px 42px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
  .search-wrap input:focus{border-color:var(--accent);}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
  select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;cursor:pointer;}
  .btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;transition:all 0.2s;}
  .btn-primary{background:#4a90d9;color:#fff;}
  .btn-primary:hover{background:#5ba0e9;transform:translateY(-1px);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .cat-tabs{padding:12px 28px;display:flex;gap:8px;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border);}
  .cat-tab{padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all 0.2s;}
  .cat-tab.active,.cat-tab:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .main{display:flex;height:calc(100vh - 160px);}
  .word-list{width:340px;min-width:280px;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);}
  .word-list::-webkit-scrollbar{width:4px;}
  .word-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .word-item{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;gap:14px;}
  .word-item:hover{background:var(--surface2);}
  .word-item.active{background:rgba(74,144,217,0.12);border-left:3px solid var(--accent);}
  .word-num{font-size:0.7rem;color:var(--muted);min-width:32px;text-align:right;}
  .word-main{flex:1;}
  .word-id{font-size:1rem;font-weight:600;color:var(--text);font-family:'Noto Sans KR',sans-serif;}
  .word-zh{font-size:0.78rem;color:var(--muted);margin-top:2px;}
  .word-pos{font-size:0.65rem;padding:2px 7px;background:var(--surface2);border-radius:10px;color:var(--accent);border:1px solid rgba(74,144,217,0.3);font-weight:600;}
  .play-mini{width:28px;height:28px;border-radius:50%;background:rgba(74,144,217,0.15);border:1px solid rgba(74,144,217,0.3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);font-size:0.7rem;transition:all 0.2s;flex-shrink:0;}
  .play-mini:hover{background:var(--accent);color:#fff;}
  .detail{flex:1;overflow-y:auto;padding:32px 36px;background:var(--bg);}
  .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:12px;}
  .detail-word{font-family:'Noto Sans KR',sans-serif;font-size:3rem;color:var(--text);line-height:1;margin-bottom:6px;}
  .detail-phonetic-table{margin-bottom:18px;}
  .ph-row{display:flex;flex-wrap:wrap;gap:14px;}
  .ph-pair{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .ph-word{font-size:1rem;color:var(--accent);font-weight:600;}
  .ph-zn{font-size:0.82rem;color:#ccc;letter-spacing:1px;}
  .detail-tags{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  .tag{padding:4px 12px;border-radius:20px;font-size:0.78rem;font-weight:500;}
  .tag-pos{background:rgba(74,144,217,0.15);color:var(--accent);border:1px solid rgba(74,144,217,0.3);}
  .tag-rank{background:rgba(39,174,96,0.15);color:var(--green);border:1px solid rgba(39,174,96,0.3);}
  .tag-cat{background:rgba(41,128,185,0.15);color:var(--blue);border:1px solid rgba(41,128,185,0.3);}
  .audio-row{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
  .audio-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;transition:all 0.2s;}
  .audio-btn.word-audio{background:var(--accent);color:#fff;}
  .audio-btn.word-audio:hover{background:#5ba0e9;transform:translateY(-1px);}
  .audio-btn.sentence-audio{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .audio-btn.sentence-audio:hover{border-color:var(--accent);color:var(--accent);}
  .section-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;font-weight:600;}
  .def-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;}
  .def-zh{font-size:1.15rem;color:var(--text);font-weight:500;margin-bottom:6px;}
  .def-en{font-size:0.85rem;color:var(--muted);}
  .example-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden;}
  .example-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:3px 0 0 3px;}
  .ex-id{font-size:1rem;color:var(--text);font-weight:500;margin-bottom:4px;line-height:1.5;font-family:'Noto Sans KR',sans-serif;}
  .ex-zh{font-size:0.88rem;color:#aaa;margin-bottom:8px;}
  .ex-phonetic{font-size:0.78rem;color:var(--muted);margin-bottom:10px;}
  .ex-audio{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;background:rgba(74,144,217,0.1);border:1px solid rgba(74,144,217,0.25);color:var(--accent);font-size:0.75rem;cursor:pointer;transition:all 0.2s;}
  .ex-audio:hover{background:rgba(74,144,217,0.2);}
  .pagination{padding:16px 28px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;background:var(--surface);border-top:1px solid var(--border);}
  .page-btn{padding:6px 12px;border-radius:6px;font-size:0.8rem;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all 0.2s;}
  .page-btn:hover,.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .quiz-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;}
  .quiz-overlay.show{display:flex;}
  .quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;max-width:480px;width:90%;}
  .quiz-q{font-size:2.2rem;font-family:'Noto Sans KR',sans-serif;color:var(--accent);margin-bottom:8px;text-align:center;cursor:pointer;}
  .quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
  .quiz-opt{padding:14px;border-radius:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);cursor:pointer;transition:all 0.2s;font-size:0.88rem;font-family:'DM Sans',sans-serif;}
  .quiz-opt:hover{border-color:var(--accent);color:var(--accent);}
  .quiz-opt.correct{background:rgba(39,174,96,0.2);border-color:var(--green);color:var(--green);}
  .quiz-opt.wrong{background:rgba(192,57,43,0.2);border-color:var(--accent2);color:var(--accent2);}
  @media(max-width:768px){.main{flex-direction:column;height:auto;}.word-list{width:100%;height:50vh;min-width:unset;}.detail{padding:20px 16px;}.detail-word{font-size:2rem;}header{padding:12px 16px;}.controls{padding:12px 16px;}.cat-tabs{padding:10px 16px;}}
</style>
</head>
<body>

<header>
  <a href="index.html" style="display:flex;align-items:center;gap:6px;color:var(--muted);font-size:0.8rem;text-decoration:none;padding:6px 10px;border:1px solid var(--border);border-radius:8px;margin-right:8px;flex-shrink:0">‹ 返回</a>
  <div class="logo">
    🇰🇷 韓語高頻詞彙
    <span>한국어 고빈도 어휘</span>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-n" id="totalCount">5000</div><div class="stat-l">總單字數</div></div>
    <div class="stat"><div class="stat-n" id="learnedCount">0</div><div class="stat-l">已學習</div></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋單字、中文、詞性…">
  </div>
  <select id="posFilter">
    <option value="">所有詞性</option>
    <option value="n.">名詞</option>
    <option value="v.">動詞</option>
    <option value="adj.">形容詞</option>
    <option value="adv.">副詞</option>
    <option value="conj.">連詞</option>
    <option value="pron.">代詞</option>
    <option value="num.">數詞</option>
  </select>
  <select id="levelFilter">
    <option value="">所有等級</option>
    <option value="1">基礎 (1-1000)</option>
    <option value="2">初級 (1001-2000)</option>
    <option value="3">中級 (2001-3500)</option>
    <option value="4">進階 (3501-5000)</option>
  </select>
  <button class="btn btn-primary" onclick="openQuiz()">📝 測驗模式</button>
  <button class="btn btn-ghost" onclick="speakAll()">🔊 全部播放</button>
</div>

<div class="cat-tabs" id="catTabs">
  <button class="cat-tab active" onclick="filterCat('all',this)">全部</button>
  <button class="cat-tab" onclick="filterCat('日常生活',this)">日常生活</button>
  <button class="cat-tab" onclick="filterCat('食物',this)">食物飲料</button>
  <button class="cat-tab" onclick="filterCat('工作',this)">工作職業</button>
  <button class="cat-tab" onclick="filterCat('家庭',this)">家庭關係</button>
  <button class="cat-tab" onclick="filterCat('時間',this)">時間數字</button>
  <button class="cat-tab" onclick="filterCat('地點',this)">地點方向</button>
  <button class="cat-tab" onclick="filterCat('身體',this)">身體健康</button>
  <button class="cat-tab" onclick="filterCat('情感',this)">情感心理</button>
  <button class="cat-tab" onclick="filterCat('自然',this)">自然環境</button>
  <button class="cat-tab" onclick="filterCat('交通',this)">交通出行</button>
  <button class="cat-tab" onclick="filterCat('教育',this)">教育學習</button>
  <button class="cat-tab" onclick="filterCat('商業',this)">商業金融</button>
</div>

<div class="main">
  <div class="word-list" id="wordList"></div>
  <div class="detail" id="detail">
    <div class="detail-empty">
      <div style="font-size:3rem">🇰🇷</div>
      <div style="font-size:1.1rem;color:var(--text)">선택하세요 · 選擇單字開始學習</div>
      <div>點擊左側單字查看詳細資訊、例句與音檔</div>
    </div>
  </div>
</div>
<div class="pagination" id="pagination"></div>

<!-- QUIZ -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-card" id="quizQuestion">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:0.78rem;color:var(--muted)" id="quizRound">第 1 輪</div>
      <div style="font-size:0.78rem;color:var(--muted)" id="quizProgress">1 / 20</div>
      <button onclick="closeQuiz()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.85rem">✕ 離開</button>
    </div>
    <div style="background:var(--border);border-radius:4px;height:4px;margin-bottom:18px">
      <div id="quizBar" style="background:var(--accent);height:4px;border-radius:4px;width:0%;transition:width 0.3s"></div>
    </div>
    <div style="font-size:0.85rem;color:var(--muted);margin-bottom:8px;text-align:center">這個單字的中文意思是？</div>
    <div class="quiz-q" id="quizWord" onclick="quizSpeak()"></div>
    <div style="font-size:0.78rem;color:var(--muted);text-align:center;margin:6px 0 4px" id="quizPhonetic"></div>
    <button onclick="quizSpeak()" id="quizSpeakBtn" style="display:flex;align-items:center;gap:8px;margin:0 auto 16px;background:rgba(74,144,217,0.15);border:1.5px solid rgba(74,144,217,0.5);border-radius:30px;padding:9px 22px;cursor:pointer;color:var(--accent);font-size:0.88rem;font-weight:600;font-family:'DM Sans',sans-serif">🔊 播放發音</button>
    <div class="quiz-options" id="quizOptions"></div>
    <div style="margin-top:14px;font-size:0.82rem;color:var(--muted);text-align:center" id="quizScore"></div>
  </div>
  <div class="quiz-card" id="quizResult" style="display:none;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:12px" id="quizResultEmoji">🎉</div>
    <div style="font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--accent);margin-bottom:8px" id="quizResultTitle"></div>
    <div style="font-size:0.9rem;color:var(--muted);margin-bottom:20px" id="quizResultMsg"></div>
    <div style="display:flex;justify-content:center;gap:24px;margin-bottom:24px">
      <div style="text-align:center"><div style="font-size:2rem;font-weight:700;color:var(--green)" id="quizCorrectNum">0</div><div style="font-size:0.72rem;color:var(--muted)">答對</div></div>
      <div style="text-align:center"><div style="font-size:2rem;font-weight:700;color:var(--accent2)" id="quizWrongNum">0</div><div style="font-size:0.72rem;color:var(--muted)">答錯</div></div>
      <div style="text-align:center"><div style="font-size:2rem;font-weight:700;color:var(--accent)" id="quizAccuracy">0%</div><div style="font-size:0.72rem;color:var(--muted)">正確率</div></div>
    </div>
    <div id="quizWrongList" style="margin-bottom:20px;text-align:left;max-height:160px;overflow-y:auto"></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button id="quizRetryWrong" onclick="retryWrong()" style="display:none;padding:13px;border-radius:10px;border:none;cursor:pointer;background:var(--accent);color:#fff;font-size:0.95rem;font-weight:600;font-family:'DM Sans',sans-serif">🔁 重考錯誤單字</button>
      <button onclick="startNewQuiz()" style="padding:13px;border-radius:10px;border:1px solid var(--border);cursor:pointer;background:var(--surface2);color:var(--text);font-size:0.9rem;font-family:'DM Sans',sans-serif">🎲 再來20題</button>
      <button onclick="closeQuiz()" style="padding:13px;border-radius:10px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);font-size:0.9rem;font-family:'DM Sans',sans-serif">✕ 離開測驗</button>
    </div>
  </div>
</div>

function toKrPhonetic(word) {
  return KR_PHONETIC[word] || word.split('').slice(0,4).join('·');
}

function buildPhoneticTable(sentence) {
  return '<span style="font-size:0.82rem;color:#aaa">'+toKrPhonetic(sentence)+'</span>';
}
function toChinesePhonetic(word) { return toKrPhonetic(word); }

// Sentences
function getSentences(w) {
  const word = w.word;
  const zh = w.zh.split('、')[0].split('（')[0].trim();
  const pos = w.pos;
  const cat = w.cat;

  const templates = {
    "n.": [
      `${word}은/는 정말 중요해요. (${zh}真的很重要。)`,
      `저는 ${word}을/를 좋아해요. (我喜歡${zh}。)`
    ],
    "v.": [
      `저는 매일 ${word}어요/아요. (我每天${zh}。)`,
      `같이 ${word}을까요? (要一起${zh}嗎？)`
    ],
    "adj.": [
      `이것은 정말 ${word}어요/아요. (這個真的很${zh}。)`,
      `날씨가 너무 ${word}어요/아요. (天氣太${zh}了。)`
    ],
    "adv.": [
      `${word} 해 주세요. (請${zh}。)`,
      `그는 ${word} 했어요. (他${zh}地做了。)`
    ],
    "phr.": [
      `한국에서는 "${word}"라고 해요. (在韓國說「${zh}」。)`,
      `처음 만날 때 "${word}" 라고 해요. (第一次見面時說「${zh}」。)`
    ],
    "num.": [
      `${word}개 주세요. (請給我${zh}個。)`,
      `${word}명이 왔어요. (來了${zh}個人。)`
    ],
    "pron.": [
      `${word}은/는 한국 사람이에요. (${zh}是韓國人。)`,
      `${word}은/는 어디에 있어요? (${zh}在哪裡？)`
    ],
  };

  const catExtra = {
    "食物": [`${word}이/가 정말 맛있어요! (${zh}真的很好吃！)`, `오늘 ${word}을/를 먹었어요. (今天吃了${zh}。)`],
    "家庭": [`우리 ${word}은/는 정말 좋아요. (我的${zh}真的很好。)`, `${word}에게 전화했어요. (打電話給${zh}了。)`],
    "情感": [`지금 기분이 ${word}어요/아요. (現在心情很${zh}。)`, `그 소식을 듣고 ${word}었어요/았어요. (聽到那個消息後感到${zh}。)`],
  };

  if(catExtra[cat]) return catExtra[cat];
  return templates[pos] || [`${word}에 대해 공부해요. (學習關於${zh}的知識。)`, `${word}은/는 한국어에서 자주 써요. (${zh}在韓語中常用。)`];
}

// APP STATE
let filtered = [...allWords];
let currentWord = null;
let currentPage = 1;
const PAGE_SIZE = 50;
let currentCat = 'all';
let quizPool=[],quizIndex=0,quizCorrectList=[],quizWrongList=[],quizRound=1,isRetryRound=false;
let currentQuizWord='';

function renderList() {
  const list = document.getElementById('wordList');
  const start=(currentPage-1)*PAGE_SIZE;
  const visible=filtered.slice(start,start+PAGE_SIZE);
  list.innerHTML = visible.map(w=>`
    <div class="word-item ${currentWord?.id===w.id?'active':''}" onclick="selectWord(${w.id})">
      <div class="word-num">#${w.id}</div>
      <div class="word-main">
        <div class="word-id">${w.word}</div>
        <div class="word-zh">${w.zh} <span style="color:#555;font-size:0.7rem">${toKrPhonetic(w.word)}</span></div>
      </div>
      <div class="word-pos">${w.pos}</div>
      <div class="play-mini" onclick="event.stopPropagation();speakWord('${w.word}')">▶</div>
    </div>`).join('');
  renderPagination();
}

function renderPagination() {
  const total=Math.ceil(filtered.length/PAGE_SIZE);
  const pg=document.getElementById('pagination');
  if(total<=1){pg.innerHTML='';return;}
  let btns=`<button class="page-btn${currentPage===1?' active':''}" onclick="goPage(1)">1</button>`;
  if(currentPage>5) btns+=`<span style="color:var(--muted);padding:0 4px">…</span>`;
  for(let i=Math.max(2,currentPage-3);i<=Math.min(total-1,currentPage+3);i++)
    btns+=`<button class="page-btn${currentPage===i?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if(currentPage<total-4) btns+=`<span style="color:var(--muted);padding:0 4px">…</span>`;
  if(total>1) btns+=`<button class="page-btn${currentPage===total?' active':''}" onclick="goPage(${total})">${total}</button>`;
  pg.innerHTML=btns;
}

function goPage(p){currentPage=p;renderList();document.getElementById('wordList').scrollTop=0;}

function selectWord(id) {
  currentWord=allWords.find(w=>w.id===id);
  if(!currentWord) return;
  currentWord._learned=true;
  document.getElementById('learnedCount').textContent=allWords.filter(w=>w._learned).length;
  renderList();
  const w=currentWord;
  const sents=getSentences(w);
  const rankLabel=['','基礎','初級','中級','進階'][w.rank||1];
  document.getElementById('detail').innerHTML=`
    <div class="detail-word">${w.word}</div>
    <div class="detail-phonetic-table"><div class="ph-row"><span class="ph-pair"><span class="ph-word">${w.word}</span><span class="ph-zn">${toKrPhonetic(w.word)}</span></span></div></div>
    <div class="detail-tags">
      <span class="tag tag-pos">${w.pos}</span>
      <span class="tag tag-rank">第 ${w.id} 高頻</span>
      <span class="tag tag-rank">${rankLabel}詞彙</span>
      <span class="tag tag-cat">${w.cat}</span>
    </div>
    <div class="audio-row">
      <button class="audio-btn word-audio" onclick="speakWord('${w.word.replace(/'/g,"\\'")}')">🔊 播放單字</button>
      <button class="audio-btn sentence-audio" onclick="speakWord('${sents[0].split('(')[0].trim().replace(/'/g,"\\'")}')">🔊 播放例句</button>
    </div>
    <div class="section-title">中文釋義</div>
    <div class="def-box"><div class="def-zh">${w.zh}</div><div class="def-en">${w.word} (${w.pos}) — 韓語第 ${w.id} 高頻單字</div></div>
    <div class="section-title" style="margin-top:20px">例句 예문</div>
    ${sents.map((s,i)=>{
      const parts=s.match(/^(.+?)\((.+)\)\.?$/);
      const kr_s=parts?parts[1].trim():s;
      const zh_s=parts?parts[2].trim():'';
      return `<div class="example-card">
        <div class="ex-id">${kr_s}</div>
        <div class="ex-zh">${zh_s}</div>
        <div class="ex-audio" onclick="speakWord('${kr_s.replace(/'/g,"\\'")}')">▶ 播放例句 ${i+1}</div>
      </div>`;
    }).join('')}
    <div class="section-title" style="margin-top:20px">相關單字</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${allWords.filter(r=>r.cat===w.cat&&r.id!==w.id).slice(0,6).map(r=>
        `<span onclick="selectWord(${r.id})" style="padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:0.82rem">${r.word} ${r.zh}</span>`
      ).join('')}
    </div>`;
}

function filterCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const pos=document.getElementById('posFilter').value;
  const level=document.getElementById('levelFilter').value;
  filtered=allWords.filter(w=>{
    if(currentCat!=='all'&&w.cat!==currentCat) return false;
    if(pos&&w.pos!==pos) return false;
    if(level){const r={1:[1,1000],2:[1001,2000],3:[2001,3500],4:[3501,5000]}[level];if(w.id<r[0]||w.id>r[1]) return false;}
    if(q) return w.word.includes(q)||w.zh.includes(q)||w.cat.includes(q);
    return true;
  });
  currentPage=1;
  renderList();
  document.getElementById('totalCount').textContent=filtered.length;
}
document.getElementById('searchInput').addEventListener('input',applyFilters);
document.getElementById('posFilter').addEventListener('change',applyFilters);
document.getElementById('levelFilter').addEventListener('change',applyFilters);

// AUDIO
let currentAudio=null;
function speakWord(text){
  if(!text) return;
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;}
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const speak=()=>{
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang='ko-KR'; utt.rate=0.85;
    const voices=window.speechSynthesis.getVoices();
    const v=voices.find(v=>v.lang==='ko-KR')||voices.find(v=>v.lang.startsWith('ko'));
    if(v) utt.voice=v;
    window.speechSynthesis.speak(utt);
  };
  if(window.speechSynthesis.getVoices().length===0){window.speechSynthesis.onvoiceschanged=speak;setTimeout(speak,300);}
  else speak();
}
function speakAll(){
  const visible=filtered.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
  let i=0;
  function next(){if(i>=visible.length) return;
    const utt=new SpeechSynthesisUtterance(visible[i].word);
    utt.lang='ko-KR';utt.rate=0.9;utt.onend=()=>{i++;setTimeout(next,400);};
    const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('ko'));
    if(v) utt.voice=v;
    window.speechSynthesis.speak(utt);
  }
  next();
}

// QUIZ
function quizSpeak(){if(currentQuizWord){const btn=document.getElementById('quizSpeakBtn');if(btn){btn.innerHTML='🔊 播放中...';setTimeout(()=>{btn.innerHTML='🔊 播放發音';},1000);}speakWord(currentQuizWord);}}
function openQuiz(){quizRound=1;isRetryRound=false;document.getElementById('quizOverlay').classList.add('show');startNewQuiz();}
function startNewQuiz(){const pool=[...filtered].sort(()=>Math.random()-0.5).slice(0,20);beginRound(pool,false);}
function retryWrong(){if(quizWrongList.length===0) return;quizRound++;isRetryRound=true;beginRound([...quizWrongList],true);}
function beginRound(pool,isRetry){quizPool=pool;quizIndex=0;quizCorrectList=[];quizWrongList=[];isRetryRound=isRetry;document.getElementById('quizQuestion').style.display='block';document.getElementById('quizResult').style.display='none';showQuestion();}
function showQuestion(){
  if(quizIndex>=quizPool.length){showResult();return;}
  const target=quizPool[quizIndex];
  currentQuizWord=target.word;
  const total=quizPool.length,current=quizIndex+1;
  document.getElementById('quizRound').textContent=isRetryRound?`🔁 重考第 ${quizRound} 輪`:`第 ${quizRound} 輪`;
  document.getElementById('quizProgress').textContent=`${current} / ${total}`;
  document.getElementById('quizBar').style.width=((quizIndex)/total*100)+'%';
  document.getElementById('quizWord').textContent=target.word;
  document.getElementById('quizPhonetic').textContent=toKrPhonetic(target.word);
  document.getElementById('quizScore').textContent=`✅ ${quizCorrectList.length}  ❌ ${quizWrongList.length}`;
  const wrongs=filtered.filter(w=>w.id!==target.id&&w.zh!==target.zh).sort(()=>Math.random()-0.5).slice(0,3);
  const opts=[...wrongs,target].sort(()=>Math.random()-0.5);
  document.getElementById('quizOptions').innerHTML=opts.map(o=>`<button class="quiz-opt" onclick="answerQuiz(this,'${o.id}','${target.id}','${target.word.replace(/'/g,"\\'")}','${target.zh.replace(/'/g,"\\'")}')"> ${o.zh}</button>`).join('');
  setTimeout(()=>speakWord(target.word),350);
}
function answerQuiz(btn,chosenId,correctId,word,correctZh){
  document.querySelectorAll('.quiz-opt').forEach(b=>b.onclick=null);
  const target=quizPool[quizIndex];
  const isCorrect=chosenId===correctId;
  if(isCorrect){btn.classList.add('correct');quizCorrectList.push(target);}
  else{btn.classList.add('wrong');quizWrongList.push(target);document.querySelectorAll('.quiz-opt').forEach(b=>{if(b.textContent.trim()===correctZh) b.classList.add('correct');});}
  speakWord(word);
  document.getElementById('quizScore').textContent=`✅ ${quizCorrectList.length}  ❌ ${quizWrongList.length}`;
  document.getElementById('quizBar').style.width=((quizIndex+1)/quizPool.length*100)+'%';
  quizIndex++;
  setTimeout(showQuestion,isCorrect?1200:1800);
}
function showResult(){
  document.getElementById('quizQuestion').style.display='none';
  document.getElementById('quizResult').style.display='block';
  const total=quizPool.length,correct=quizCorrectList.length,wrong=quizWrongList.length,pct=Math.round(correct/total*100);
  const e=pct===100?'🏆':pct>=80?'🎉':pct>=60?'👍':pct>=40?'📖':'💪';
  const t=pct===100?'完美！':pct>=80?'非常好！':pct>=60?'不錯喔！':pct>=40?'繼續努力！':'加油！';
  document.getElementById('quizResultEmoji').textContent=e;
  document.getElementById('quizResultTitle').textContent=t;
  document.getElementById('quizResultMsg').textContent=`正確率 ${pct}%`;
  document.getElementById('quizCorrectNum').textContent=correct;
  document.getElementById('quizWrongNum').textContent=wrong;
  document.getElementById('quizAccuracy').textContent=pct+'%';
  const wl=document.getElementById('quizWrongList');
  if(quizWrongList.length>0){
    wl.innerHTML='<div style="font-size:0.72rem;color:var(--muted);margin-bottom:8px">❌ 答錯的單字</div>'+
      quizWrongList.map(w=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--accent2)"><span style="font-weight:600;color:var(--text)">${w.word}</span><span style="color:var(--muted);font-size:0.82rem">${w.zh}</span><span onclick="speakWord('${w.word}')" style="cursor:pointer;color:var(--accent)">🔊</span></div>`).join('');
    document.getElementById('quizRetryWrong').style.display='block';
  } else {
    wl.innerHTML='<div style="text-align:center;color:var(--green);padding:12px">🎊 沒有答錯的單字！</div>';
    document.getElementById('quizRetryWrong').style.display='none';
  }
}
function closeQuiz(){document.getElementById('quizOverlay').classList.remove('show');}

if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();}
renderList();
document.getElementById('totalCount').textContent=allWords.length;
</script>
