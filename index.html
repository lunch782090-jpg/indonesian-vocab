<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>印尼語高頻5000單字</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="印尼語單字">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#CC0001">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='32' fill='%23CC0001'/%3E%3Crect y='32' width='64' height='32' fill='%23FFFFFF'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" id="appIcon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='96' fill='%23CC0001'/%3E%3Crect y='96' width='192' height='96' fill='%23FFFFFF'/%3E%3C/svg%3E">
<script>
window.addEventListener('load', function() {
  try {
    const canvas = document.createElement('canvas');
    canvas.width = 192; canvas.height = 192;
    const ctx = canvas.getContext('2d');
    if(ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(0,0,192,192,28);
      ctx.clip();
    }
    ctx.fillStyle = '#CC0001';
    ctx.fillRect(0,0,192,96);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0,96,192,96);
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#CC0001';
    ctx.fillText('ID', 96, 152);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('語', 96, 72);
    const link = document.getElementById('appIcon');
    if(link) link.href = canvas.toDataURL('image/png');
  } catch(e) {}
});
</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #e8a020;
    --accent2: #c0392b;
    --text: #f0ede8;
    --muted: #8a8799;
    --green: #27ae60;
    --blue: #2980b9;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a0a00 0%, #0d0d0f 60%);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top:0; z-index:100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text); font-weight:400; font-size:0.9rem; display:block; }
  .stats-bar {
    display: flex; gap: 20px; align-items:center;
  }
  .stat { text-align:center; }
  .stat-n { font-size:1.2rem; font-weight:600; color:var(--accent); }
  .stat-l { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

  /* CONTROLS */
  .controls {
    padding: 16px 28px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .search-wrap {
    flex:1; min-width:200px; position:relative;
  }
  .search-wrap input {
    width:100%; background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px 10px 42px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:1rem;
  }
  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline:none; cursor:pointer;
  }
  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #f0b030; transform:translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* CATEGORY TABS */
  .cat-tabs {
    padding: 12px 28px;
    display:flex; gap:8px; flex-wrap:wrap;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .cat-tab {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight:500;
    cursor:pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .cat-tab.active, .cat-tab:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* MAIN */
  .main { display:flex; height: calc(100vh - 160px); }

  /* WORD LIST */
  .word-list {
    width: 340px;
    min-width:280px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--surface);
  }
  .word-list::-webkit-scrollbar { width:4px; }
  .word-list::-webkit-scrollbar-track { background: transparent; }
  .word-list::-webkit-scrollbar-thumb { background: var(--border); border-radius:2px; }

  .word-item {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    gap: 14px;
  }
  .word-item:hover { background: var(--surface2); }
  .word-item.active { background: rgba(232,160,32,0.12); border-left: 3px solid var(--accent); }
  .word-num {
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 32px;
    text-align:right;
  }
  .word-main {
    flex:1;
  }
  .word-id { font-size:1rem; font-weight:600; color:var(--text); }
  .word-zh { font-size: 0.78rem; color: var(--muted); margin-top:2px; }
  .word-pos {
    font-size:0.65rem; padding:2px 7px;
    background: var(--surface2); border-radius:10px;
    color: var(--accent); border:1px solid rgba(232,160,32,0.3);
    font-weight:600;
  }
  .play-mini {
    width:28px; height:28px;
    border-radius:50%;
    background: rgba(232,160,32,0.15);
    border: 1px solid rgba(232,160,32,0.3);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color: var(--accent);
    font-size:0.7rem;
    transition: all 0.2s;
    flex-shrink:0;
  }
  .play-mini:hover { background: var(--accent); color:#000; }

  /* DETAIL PANEL */
  .detail {
    flex:1;
    overflow-y: auto;
    padding: 32px 36px;
    background: var(--bg);
  }
  .detail::-webkit-scrollbar { width:4px; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius:2px; }

  .detail-empty {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100%;
    color: var(--muted);
    gap:12px;
  }
  .detail-empty .icon { font-size:3rem; }

  .detail-word {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    color: var(--text);
    line-height:1;
    margin-bottom:6px;
  }
  .detail-phonetic-table { margin-bottom: 18px; }
  .ph-row { display: flex; flex-wrap: wrap; gap: 14px; }
  .ph-pair {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .ph-word {
    font-size: 1rem; color: var(--accent); font-weight: 600;
  }
  .ph-zn {
    font-size: 0.82rem; color: #ccc; letter-spacing: 1px;
  }
  /* also style inside example cards */
  .ex-phonetic .ph-row { gap: 10px; }
  .ex-phonetic .ph-word { font-size: 0.82rem; color: var(--accent); }
  .ex-phonetic .ph-zn { font-size: 0.72rem; color: var(--muted); }
  .detail-phonetic {
    font-size:1rem; color:var(--muted); margin-bottom:16px;
    letter-spacing:0.5px;
  }
  .detail-tags { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .tag {
    padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:500;
  }
  .tag-pos { background:rgba(232,160,32,0.15); color:var(--accent); border:1px solid rgba(232,160,32,0.3); }
  .tag-rank { background:rgba(39,174,96,0.15); color:var(--green); border:1px solid rgba(39,174,96,0.3); }
  .tag-cat { background:rgba(41,128,185,0.15); color:var(--blue); border:1px solid rgba(41,128,185,0.3); }

  .audio-row {
    display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap;
  }
  .audio-btn {
    display:flex; align-items:center; gap:8px;
    padding:10px 18px;
    border-radius:8px;
    border:none; cursor:pointer;
    font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500;
    transition: all 0.2s;
  }
  .audio-btn.word-audio { background: var(--accent); color:#000; }
  .audio-btn.word-audio:hover { background:#f0b030; transform:translateY(-1px); }
  .audio-btn.sentence-audio { background: var(--surface2); color:var(--text); border:1px solid var(--border); }
  .audio-btn.sentence-audio:hover { border-color:var(--accent); color:var(--accent); }
  .audio-btn.playing { animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .section-title {
    font-size:0.7rem; text-transform:uppercase; letter-spacing:2px;
    color:var(--muted); margin-bottom:10px; font-weight:600;
  }

  .def-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:12px;
    padding:18px 20px;
    margin-bottom:20px;
  }
  .def-zh { font-size:1.15rem; color:var(--text); font-weight:500; margin-bottom:6px; }
  .def-en { font-size:0.85rem; color:var(--muted); }

  .example-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:12px;
    padding:18px 20px;
    margin-bottom:14px;
    position:relative;
    overflow:hidden;
  }
  .example-card::before {
    content:'';
    position:absolute; left:0; top:0; bottom:0;
    width:3px;
    background: var(--accent);
    border-radius:3px 0 0 3px;
  }
  .ex-id { font-size:1rem; color:var(--text); font-weight:500; margin-bottom:4px; line-height:1.5; }
  .ex-zh { font-size:0.88rem; color: #aaa; margin-bottom:8px; }
  .ex-phonetic { font-size:0.78rem; color:var(--muted); margin-bottom:10px; font-style:italic; }
  .ex-audio {
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 12px; border-radius:6px;
    background: rgba(232,160,32,0.1);
    border:1px solid rgba(232,160,32,0.25);
    color:var(--accent); font-size:0.75rem;
    cursor:pointer; transition:all 0.2s;
  }
  .ex-audio:hover { background:rgba(232,160,32,0.2); }

  /* AI LOADING */
  .loading-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:12px;
    padding:24px;
    text-align:center;
    color:var(--muted);
  }
  .spinner {
    width:28px; height:28px;
    border:2px solid var(--border);
    border-top-color: var(--accent);
    border-radius:50%;
    animation: spin 0.8s linear infinite;
    margin:0 auto 12px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* PAGINATION */
  .pagination {
    padding:16px 28px;
    display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
    background:var(--surface);
    border-top:1px solid var(--border);
  }
  .page-btn {
    padding:6px 12px; border-radius:6px; font-size:0.8rem;
    background:var(--surface2); color:var(--muted);
    border:1px solid var(--border); cursor:pointer; transition:all 0.2s;
  }
  .page-btn:hover, .page-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }

  /* QUIZ MODE */
  .quiz-overlay {
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,0.85);
    z-index:200;
    align-items:center; justify-content:center;
  }
  .quiz-overlay.show { display:flex; }
  .quiz-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:40px;
    max-width:500px; width:90%;
    text-align:center;
  }
  .quiz-q { font-size:2.5rem; font-family:'Playfair Display',serif; color:var(--accent); margin-bottom:20px; }
  .quiz-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
  .quiz-opt {
    padding:14px; border-radius:8px;
    background:var(--surface2); color:var(--text);
    border:1px solid var(--border); cursor:pointer;
    transition:all 0.2s; font-size:0.9rem;
  }
  .quiz-opt:hover { border-color:var(--accent); color:var(--accent); }
  .quiz-opt.correct { background:rgba(39,174,96,0.2); border-color:var(--green); color:var(--green); }
  .quiz-opt.wrong { background:rgba(192,57,43,0.2); border-color:var(--accent2); color:var(--accent2); }

  @media (max-width:768px) {
    .main { flex-direction:column; height:auto; }
    .word-list { width:100%; height:50vh; min-width:unset; }
    .detail { padding:20px 16px; }
    .detail-word { font-size:2.2rem; }
    header { padding:12px 16px; }
    .controls { padding:12px 16px; }
    .cat-tabs { padding:10px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    🇮🇩 印尼語高頻詞彙
    <span>Kosakata Bahasa Indonesia</span>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-n" id="totalCount">5000</div><div class="stat-l">總單字數</div></div>
    <div class="stat"><div class="stat-n" id="learnedCount">0</div><div class="stat-l">已學習</div></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋單字、中文、詞性…">
  </div>
  <select id="posFilter">
    <option value="">所有詞性</option>
    <option value="n.">名詞</option>
    <option value="v.">動詞</option>
    <option value="adj.">形容詞</option>
    <option value="adv.">副詞</option>
    <option value="prep.">介詞</option>
    <option value="conj.">連詞</option>
    <option value="pron.">代詞</option>
    <option value="num.">數詞</option>
  </select>
  <select id="levelFilter">
    <option value="">所有等級</option>
    <option value="1">基礎 (1-1000)</option>
    <option value="2">初級 (1001-2000)</option>
    <option value="3">中級 (2001-3500)</option>
    <option value="4">進階 (3501-5000)</option>
  </select>
  <button class="btn btn-primary" onclick="openQuiz()">📝 測驗模式</button>
  <button class="btn btn-ghost" onclick="speakAll()">🔊 全部播放</button>
  <button class="btn btn-ghost" onclick="diagVoice()">🎙️ 語音診斷</button>
</div>

<div class="cat-tabs" id="catTabs">
  <button class="cat-tab active" onclick="filterCat('all',this)">全部</button>
  <button class="cat-tab" onclick="filterCat('日常生活',this)">日常生活</button>
  <button class="cat-tab" onclick="filterCat('食物',this)">食物飲料</button>
  <button class="cat-tab" onclick="filterCat('工作',this)">工作職業</button>
  <button class="cat-tab" onclick="filterCat('家庭',this)">家庭關係</button>
  <button class="cat-tab" onclick="filterCat('時間',this)">時間數字</button>
  <button class="cat-tab" onclick="filterCat('地點',this)">地點方向</button>
  <button class="cat-tab" onclick="filterCat('身體',this)">身體健康</button>
  <button class="cat-tab" onclick="filterCat('情感',this)">情感心理</button>
  <button class="cat-tab" onclick="filterCat('自然',this)">自然環境</button>
  <button class="cat-tab" onclick="filterCat('交通',this)">交通出行</button>
  <button class="cat-tab" onclick="filterCat('教育',this)">教育學習</button>
  <button class="cat-tab" onclick="filterCat('商業',this)">商業金融</button>
</div>

<div class="main">
  <div class="word-list" id="wordList"></div>
  <div class="detail" id="detail">
    <div class="detail-empty">
      <div class="icon">🇮🇩</div>
      <div style="font-size:1.1rem;color:var(--text)">選擇單字開始學習</div>
      <div>點擊左側單字查看詳細資訊、例句與音檔</div>
    </div>
  </div>
</div>

<div class="pagination" id="pagination"></div>

<div class="quiz-overlay" id="quizOverlay">
  <!-- QUESTION SCREEN -->
  <div class="quiz-card" id="quizQuestion">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:0.78rem;color:var(--muted)" id="quizRound">第 1 輪</div>
      <div style="font-size:0.78rem;color:var(--muted)" id="quizProgress">1 / 20</div>
      <button onclick="closeQuiz()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem">✕ 離開</button>
    </div>
    <!-- Progress bar -->
    <div style="background:var(--border);border-radius:4px;height:4px;margin-bottom:18px">
      <div id="quizBar" style="background:var(--accent);height:4px;border-radius:4px;width:0%;transition:width 0.3s"></div>
    </div>
    <div style="font-size:0.85rem;color:var(--muted);margin-bottom:8px">這個單字的中文意思是？</div>
    <div class="quiz-q" id="quizWord" style="cursor:pointer" onclick="quizSpeak()"></div>
    <div style="font-size:0.78rem;color:var(--muted);margin:6px 0 4px" id="quizPhonetic"></div>
    <button onclick="quizSpeak()" id="quizSpeakBtn" style="
      display:flex;align-items:center;gap:8px;margin:0 auto 16px;
      background:rgba(232,160,32,0.15);border:1.5px solid rgba(232,160,32,0.5);
      border-radius:30px;padding:9px 22px;cursor:pointer;
      color:var(--accent);font-size:0.88rem;font-weight:600;
      font-family:'DM Sans',sans-serif;transition:all 0.2s;">
      🔊 播放發音
    </button>
    <div class="quiz-options" id="quizOptions"></div>
    <div style="margin-top:14px;font-size:0.82rem;color:var(--muted);text-align:center" id="quizScore"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="quiz-card" id="quizResult" style="display:none;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:12px" id="quizResultEmoji">🎉</div>
    <div style="font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--accent);margin-bottom:8px" id="quizResultTitle"></div>
    <div style="font-size:0.9rem;color:var(--muted);margin-bottom:20px" id="quizResultMsg"></div>
    <!-- Score circle -->
    <div style="display:flex;justify-content:center;gap:24px;margin-bottom:24px">
      <div style="text-align:center">
        <div style="font-size:2rem;font-weight:700;color:var(--green)" id="quizCorrectNum">0</div>
        <div style="font-size:0.72rem;color:var(--muted)">答對</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:2rem;font-weight:700;color:var(--accent2)" id="quizWrongNum">0</div>
        <div style="font-size:0.72rem;color:var(--muted)">答錯</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:2rem;font-weight:700;color:var(--accent)" id="quizAccuracy">0%</div>
        <div style="font-size:0.72rem;color:var(--muted)">正確率</div>
      </div>
    </div>
    <!-- Wrong words review -->
    <div id="quizWrongList" style="margin-bottom:20px;text-align:left;max-height:160px;overflow-y:auto"></div>
    <!-- Buttons -->
    <div style="display:flex;flex-direction:column;gap:10px">
      <button id="quizRetryWrong" onclick="retryWrong()" style="display:none;
        padding:13px;border-radius:10px;border:none;cursor:pointer;
        background:var(--accent);color:#000;font-size:0.95rem;font-weight:600;
        font-family:'DM Sans',sans-serif">
        🔁 重考錯誤單字
      </button>

function getSentences(word) {
  const key = word.toLowerCase();
  if(SENTENCES[key]) return SENTENCES[key];
  
  // Generate sentences dynamically based on word properties
  const w = allWords.find(x => x.word.toLowerCase() === key);
  if(!w) return SENTENCES["default"];
  
  return generateSentences(w);
}

}

function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}
function cap(str) {
  if(!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function renderList() {
  const list = document.getElementById('wordList');
  const start = (currentPage-1)*PAGE_SIZE;
  const end = Math.min(start+PAGE_SIZE, filtered.length);
  const visible = filtered.slice(start,end);
  
  list.innerHTML = visible.map(w => `
    <div class="word-item ${currentWord?.id===w.id?'active':''}" onclick="selectWord(${w.id})">
      <div class="word-num">#${w.id}</div>

        <div class="word-zh">${w.zh} <span style="color:#666;font-size:0.72rem">${toChinesePhonetic(w.word)}</span></div>

      <div class="word-pos">${w.pos}</div>
      <div class="play-mini" onclick="event.stopPropagation();speakWord('${w.word}')">▶</div>
    </div>
  `).join('');
  
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if(total <= 1) { pg.innerHTML=''; return; }
  
  let btns = '';
  const range = 3;
  btns += `<button class="page-btn${currentPage===1?' active':''}" onclick="goPage(1)">1</button>`;
  if(currentPage > range+2) btns += `<span style="color:var(--muted);padding:0 4px">…</span>`;
  
  for(let i=Math.max(2,currentPage-range); i<=Math.min(total-1,currentPage+range); i++) {
    btns += `<button class="page-btn${currentPage===i?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if(currentPage < total-range-1) btns += `<span style="color:var(--muted);padding:0 4px">…</span>`;
  if(total > 1) btns += `<button class="page-btn${currentPage===total?' active':''}" onclick="goPage(${total})">${total}</button>`;
  
  pg.innerHTML = btns;
}

function goPage(p) {
  currentPage = p;
  renderList();
  document.getElementById('wordList').scrollTop = 0;
}

  currentWord = allWords.find(w=>w.id===id);

    parseInt(document.getElementById('learnedCount').textContent) + 
    (currentWord._learned ? 0 : 1);
  currentWord._learned = true;

function toChinesePhonetic(word) {
  if(!word) return '';
  const w = word.toLowerCase().replace(/[^a-z]/g,'');
  if(!w) return '';
  let result = [];
  let i = 0;
  while(i < w.length) {
    let matched = false;
    // Try longest match first (4 chars down to 1)
    for(let len = Math.min(5, w.length - i); len >= 1; len--) {
      const chunk = w.substring(i, i+len);
      if(SYLLABLE_MAP[chunk]) {
        result.push(SYLLABLE_MAP[chunk]);
        i += len;
        matched = true;
        break;
      }
    }
    // If no match, skip silently (don't output raw letters)
    if(!matched) i++;
  }
  return result.join('') || word;
}

function buildPhoneticTable(sentence) {
  const words = sentence.trim().split(/\s+/);
  return '<div class="ph-row">' + words.map(w => {
    const clean = w.replace(/[^a-zA-Z]/g,'');
    if(!clean) return '';
    const zh = toChinesePhonetic(clean);
    return '<span class="ph-pair"><span class="ph-word">' + w + '</span><span class="ph-zn">' + zh + '</span></span>';
  }).filter(Boolean).join('') + '</div>';
}

function generatePhonetic(sentence) {
  return buildPhoneticTable(sentence);
}

function getRelated(w) {
  return allWords.filter(r => r.cat === w.cat && r.id !== w.id).slice(0,6);
}

// ===================== AUDIO =====================
let currentAudio = null;

function speakWord(text) {
  if(!text) return;
  
  // Stop any current audio
  if(currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  window.speechSynthesis && window.speechSynthesis.cancel();

  // Method 1: Google Translate TTS (most reliable for Indonesian)
  const encoded = encodeURIComponent(text.trim());
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encoded}&tl=id&client=tw-ob`;
  
  const audio = new Audio();
  audio.crossOrigin = 'anonymous';
  currentAudio = audio;
  
  audio.onerror = () => {
    // Fallback: Web Speech API
    fallbackSpeak(text);
  };

  // Try fetching via a proxy-friendly approach
  fetch(`https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encoded}&tl=id&client=gtx`)
    .then(r => r.blob())
    .then(blob => {
      const blobUrl = URL.createObjectURL(blob);
      audio.src = blobUrl;
      audio.play().catch(() => fallbackSpeak(text));
    })
    .catch(() => fallbackSpeak(text));
}

function fallbackSpeak(text) {
  // Web Speech API fallback with voice priority
  if(!window.speechSynthesis) return;
  
  const speak = () => {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'id-ID';
    utt.rate = 0.82;
    utt.pitch = 1.0;
    
    const voices = window.speechSynthesis.getVoices();
    // Priority: Indonesian > Malay > any available
    const best = 
      voices.find(v => v.lang === 'id-ID') ||
      voices.find(v => v.lang === 'id_ID') ||
      voices.find(v => v.lang.startsWith('id')) ||
      voices.find(v => v.lang.startsWith('ms')) ||
      voices.find(v => v.name.toLowerCase().includes('indonesian')) ||
      null;
    
    if(best) utt.voice = best;
    window.speechSynthesis.speak(utt);
    showVoiceStatus(best);
  };

  // Voices may not be loaded yet
  if(window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.onvoiceschanged = speak;
    // Force trigger
    window.speechSynthesis.getVoices();
    setTimeout(speak, 300);
  } else {
    speak();
  }
}

function showVoiceStatus(voice) {
  let bar = document.getElementById('voiceBar');
  if(!bar) {
    bar = document.createElement('div');
    bar.id = 'voiceBar';
    bar.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#1e1e24;border:1px solid #2a2a35;border-radius:8px;padding:8px 14px;font-size:0.78rem;color:#8a8799;z-index:999;transition:opacity 0.4s';
    document.body.appendChild(bar);
  }
  const lang = voice ? voice.lang : '系統預設';
  const name = voice ? voice.name : '無印尼語音';
  bar.style.opacity = '1';
  bar.innerHTML = `🔊 ${name} <span style="color:${voice && voice.lang.startsWith('id') ? '#27ae60' : '#e8a020'}">${lang}</span>`;
  clearTimeout(bar._t);
  bar._t = setTimeout(() => bar.style.opacity = '0', 3000);
}

function speakAll() {
  const visible = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  let i = 0;
  function next() {
    if(i >= visible.length) return;
    if(currentAudio) { currentAudio.pause(); currentAudio.currentTime=0; }
    window.speechSynthesis && window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(visible[i].word);
    utt.lang = 'id-ID'; utt.rate = 0.9;
    utt.onend = () => { i++; setTimeout(next, 400); };
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v=>v.lang.startsWith('id')) || voices.find(v=>v.lang.startsWith('ms'));
    if(v) utt.voice = v;
    window.speechSynthesis.speak(utt);
  }
  next();
}

// ===================== FILTERS =====================
function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const pos = document.getElementById('posFilter').value;
  const level = document.getElementById('levelFilter').value;
  
  filtered = allWords.filter(w => {
    if(currentCat !== 'all' && w.cat !== currentCat) return false;
    if(pos && w.pos !== pos) return false;
    if(level) {
      const ranges = {1:[1,1000],2:[1001,2000],3:[2001,3500],4:[3501,5000]};
      const [lo,hi] = ranges[level];
      if(w.id < lo || w.id > hi) return false;
    }
    if(q) {
      return w.word.toLowerCase().includes(q) || 
             w.zh.includes(q) || 
             w.cat.includes(q);
    }
    return true;
  });
  
  currentPage = 1;
  renderList();
  document.getElementById('totalCount').textContent = filtered.length;
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('posFilter').addEventListener('change', applyFilters);
document.getElementById('levelFilter').addEventListener('change', applyFilters);

// ===================== QUIZ =====================
// ===================== QUIZ STATE =====================
let currentQuizWord = '';
let quizPool = [];        // 本輪20題
let quizIndex = 0;        // 目前第幾題
let quizCorrectList = []; // 答對的
let quizWrongList = [];   // 答錯的
let quizRound = 1;        // 第幾輪
let isRetryRound = false; // 是否為重考輪

function quizSpeak() {
  if(currentQuizWord) {
    const btn = document.getElementById('quizSpeakBtn');
    if(btn) { btn.innerHTML = '🔊 播放中...'; setTimeout(()=>{ btn.innerHTML='🔊 播放發音'; }, 1000); }
    speakWord(currentQuizWord);
  }
}

function openQuiz() {
  quizRound = 1;
  isRetryRound = false;
  document.getElementById('quizOverlay').classList.add('show');
  startNewQuiz();
}

function startNewQuiz() {
  // Pick 20 random words from filtered list
  const pool = [...filtered].sort(() => Math.random() - 0.5).slice(0, 20);
  beginRound(pool, false);
}

function retryWrong() {
  if(quizWrongList.length === 0) return;
  quizRound++;
  isRetryRound = true;
  beginRound([...quizWrongList], true);
}

function beginRound(pool, isRetry) {
  quizPool = pool;
  quizIndex = 0;
  quizCorrectList = [];
  quizWrongList = [];
  isRetryRound = isRetry;

  // Show question screen, hide result
  document.getElementById('quizQuestion').style.display = 'block';
  document.getElementById('quizResult').style.display = 'none';

  showQuestion();
}

function showQuestion() {
  if(quizIndex >= quizPool.length) {
    showResult();
    return;
  }

  const target = quizPool[quizIndex];
  currentQuizWord = target.word;

  // Update progress
  const total = quizPool.length;
  const current = quizIndex + 1;
  const pct = ((quizIndex) / total * 100).toFixed(0);

  document.getElementById('quizRound').textContent = isRetryRound ? `🔁 重考第 ${quizRound} 輪` : `第 ${quizRound} 輪`;
  document.getElementById('quizProgress').textContent = `${current} / ${total}`;
  document.getElementById('quizBar').style.width = pct + '%';
  document.getElementById('quizWord').textContent = target.word;
  document.getElementById('quizPhonetic').textContent = toChinesePhonetic(target.word);
  document.getElementById('quizScore').textContent = `✅ ${quizCorrectList.length}  ❌ ${quizWrongList.length}`;

  // Build options: 3 wrong + 1 correct
  const wrongPool = filtered.filter(w => w.id !== target.id && w.zh !== target.zh);
  const wrongs = wrongPool.sort(() => Math.random() - 0.5).slice(0, 3);
  const opts = [...wrongs, target].sort(() => Math.random() - 0.5);

  document.getElementById('quizOptions').innerHTML = opts.map(o => `
    <button class="quiz-opt" onclick="answerQuiz(this,'${o.id}','${target.id}','${target.word.replace(/'/g,"\'")}')">
      ${o.zh}
    </button>
  `).join('');

  // Auto-play
  setTimeout(() => speakWord(target.word), 350);
}

function answerQuiz(btn, chosenId, correctId, word) {
  // Disable all buttons
  document.querySelectorAll('.quiz-opt').forEach(b => b.onclick = null);

  const isCorrect = chosenId === correctId;
  const target = quizPool[quizIndex];

  if(isCorrect) {
    btn.classList.add('correct');
    quizCorrectList.push(target);
  } else {
    btn.classList.add('wrong');
    quizWrongList.push(target);
    // Highlight correct answer
    document.querySelectorAll('.quiz-opt').forEach(b => {
      if(b.textContent.trim() === target.zh) b.classList.add('correct');
    });
  }

  speakWord(word);

  // Update score display
  document.getElementById('quizScore').textContent = `✅ ${quizCorrectList.length}  ❌ ${quizWrongList.length}`;
  // Update progress bar
  const pct = ((quizIndex + 1) / quizPool.length * 100).toFixed(0);
  document.getElementById('quizBar').style.width = pct + '%';

  quizIndex++;
  setTimeout(showQuestion, isCorrect ? 1200 : 1800);
}

function showResult() {
  document.getElementById('quizQuestion').style.display = 'none';
  document.getElementById('quizResult').style.display = 'block';

  const total = quizPool.length;
  const correct = quizCorrectList.length;
  const wrong = quizWrongList.length;
  const pct = Math.round(correct / total * 100);

  // Emoji & title based on score
  let emoji, title, msg;
  if(pct === 100) { emoji='🏆'; title='完美！'; msg='全部答對，太厲害了！'; }
  else if(pct >= 80) { emoji='🎉'; title='非常好！'; msg='繼續加油，快全對了！'; }
  else if(pct >= 60) { emoji='👍'; title='不錯喔！'; msg='還有一些需要加強。'; }
  else if(pct >= 40) { emoji='📖'; title='繼續努力！'; msg='多複習幾次會更好。'; }
  else { emoji='💪'; title='加油！'; msg='錯誤的單字要重複練習。'; }

  document.getElementById('quizResultEmoji').textContent = emoji;
  document.getElementById('quizResultTitle').textContent = title;
  document.getElementById('quizResultMsg').textContent = msg;
  document.getElementById('quizCorrectNum').textContent = correct;
  document.getElementById('quizWrongNum').textContent = wrong;
  document.getElementById('quizAccuracy').textContent = pct + '%';

  // Show wrong words list
  const wrongListEl = document.getElementById('quizWrongList');
  if(quizWrongList.length > 0) {
    wrongListEl.innerHTML = '<div style="font-size:0.72rem;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">❌ 答錯的單字</div>' +
      quizWrongList.map(w => `
        <div style="display:flex;justify-content:space-between;align-items:center;
          padding:8px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px;
          border-left:3px solid var(--accent2)">
          <span style="font-weight:600;color:var(--text)">${w.word}</span>
          <span style="color:var(--muted);font-size:0.82rem">${w.zh}</span>
          <span onclick="speakWord('${w.word}')" style="cursor:pointer;color:var(--accent);font-size:0.85rem">🔊</span>
        </div>
      `).join('');
    document.getElementById('quizRetryWrong').style.display = 'block';
  } else {
    wrongListEl.innerHTML = '<div style="text-align:center;color:var(--green);padding:12px">🎊 沒有答錯的單字！</div>';
    document.getElementById('quizRetryWrong').style.display = 'none';
  }
}

function closeQuiz() {
  document.getElementById('quizOverlay').classList.remove('show');
}

// ===================== VOICE DIAGNOSTIC =====================
function diagVoice() {
  const voices = window.speechSynthesis.getVoices();
  const idVoices = voices.filter(v => v.lang.startsWith('id') || v.lang.startsWith('ms'));
  
  let msg = `共找到 ${voices.length} 個語音\n`;
  if(idVoices.length > 0) {
    msg += `\n✅ 印尼/馬來語音（${idVoices.length}個）：\n`;
    idVoices.forEach(v => msg += `• ${v.name} (${v.lang})\n`);
  } else {
    msg += `\n⚠️ 未找到印尼語語音\n`;
    msg += `將使用系統預設語音朗讀\n\n`;
    msg += `如需印尼語發音，請：\n`;
    msg += `• Windows: 設定 > 時間與語言 > 語音 > 新增語音包 > 印尼文\n`;
    msg += `• Mac: 系統偏好設定 > 協助使用 > 朗讀 > 系統聲音\n`;
    msg += `• Chrome: 通常已內建 Google 印尼語語音`;
  }
  alert(msg);
  
  // Also try to speak a test word
  fallbackSpeak('selamat datang');
}

// Preload voices
if(window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
renderList();
document.getElementById('totalCount').textContent = allWords.length;
</script>
