<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>語言學習中心</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="語言學習">
<meta name="theme-color" content="#0d0d0f">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --text: #f0ede8;
    --muted: #8a8799;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    text-align: center;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #e8a020, #fff, #e8a020);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    margin-bottom: 48px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }

  .lang-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 20px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .lang-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: 18px;
  }
  .lang-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
  .lang-card:hover::before { opacity: 1; }

  .card-id::before { background: linear-gradient(135deg,rgba(204,0,1,0.12),rgba(255,255,255,0.05)); }
  .card-kr::before { background: linear-gradient(135deg,rgba(0,71,171,0.12),rgba(205,46,58,0.08)); }
  .card-en::before { background: linear-gradient(135deg,rgba(0,36,125,0.12),rgba(204,16,52,0.08)); }

  .flag {
    font-size: 3rem;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }
  .card-info { flex: 1; }
  .card-lang {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 2px;
  }
  .card-id .card-lang { color: #ff6b6b; }
  .card-kr .card-lang { color: #74b9ff; }
  .card-en .card-lang { color: #a29bfe; }

  .card-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-tag {
    font-size: 0.68rem;
    padding: 3px 9px;
    border-radius: 12px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .card-arrow {
    font-size: 1.3rem;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .lang-card:hover .card-arrow { transform: translateX(4px); color: var(--text); }

  .footer {
    margin-top: 40px;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<div class="logo">📚 語言學習中心</div>
<div class="subtitle">選擇你想學習的語言 · 高頻5000單字</div>

<div class="cards">

  <a class="lang-card card-id" href="id.html">
    <div class="flag">🇮🇩</div>
    <div class="card-info">
      <div class="card-lang">印尼語</div>
      <div class="card-sub">Bahasa Indonesia</div>
      <div class="card-tags">
        <span class="card-tag">5000 單字</span>
        <span class="card-tag">中文諧音</span>
        <span class="card-tag">例句音檔</span>
        <span class="card-tag">測驗模式</span>
      </div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <a class="lang-card card-kr" href="kr.html">
    <div class="flag">🇰🇷</div>
    <div class="card-info">
      <div class="card-lang">韓語</div>
      <div class="card-sub">한국어 Korean</div>
      <div class="card-tags">
        <span class="card-tag">5000 單字</span>
        <span class="card-tag">中文諧音</span>
        <span class="card-tag">例句音檔</span>
        <span class="card-tag">測驗模式</span>
      </div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <a class="lang-card card-en" href="en.html">
    <div class="flag">🇺🇸</div>
    <div class="card-info">
      <div class="card-lang">英語</div>
      <div class="card-sub">English</div>
      <div class="card-tags">
        <span class="card-tag">5000 單字</span>
        <span class="card-tag">中文諧音</span>
        <span class="card-tag">例句音檔</span>
        <span class="card-tag">測驗模式</span>
      </div>
    </div>
    <div class="card-arrow">›</div>
  </a>

</div>

<div class="footer">點擊任一語言開始學習 · 支援發音播放</div>

</body>
</html>
